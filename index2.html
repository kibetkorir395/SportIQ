<!DOCTYPE html>

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SportsOrganization",
      "name": "Sport IQ",
      "url": "https://sportiq.com",
      "logo": "https://sportiq.com/logo.png",
      "description": "Premium football predictions and betting tips provider",
      "sameAs": [
        "https://www.facebook.com/sportiq",
        "https://twitter.com/sportiq",
        "https://www.instagram.com/sportiq",
        "https://t.me/sportiq"
      ],
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "KE"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "email": "support@sportiq.com"
      }
    }
  </script>

    <!-- Organization Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Sport IQ",
      "url": "https://sportiq.com",
      "logo": "https://sportiq.com/logo.png",
      "sameAs": [
        "https://www.facebook.com/sportiq",
        "https://twitter.com/sportiq",
        "https://www.instagram.com/sportiq"
      ]
    }
  </script>

    <!-- Website Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Sport IQ",
      "url": "https://sportiq.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://sportiq.com/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
  </script>

    <!-- Breadcrumb Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "Home",
          "item": "https://sportiq.com/"
        },
        {
          "@type": "ListItem",
          "position": 2,
          "name": "Predictions",
          "item": "https://sportiq.com/predictions"
        },
        {
          "@type": "ListItem",
          "position": 3,
          "name": "Pricing",
          "item": "https://sportiq.com/premium"
        }
      ]
    }
  </script>

    <!-- Article Schema (for blog posts) -->
    <!-- Add this dynamically on blog pages -->

    <!-- Product Schema (for subscription packages) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Product",
      "name": "Sport IQ Premium Subscription",
      "description": "Get access to premium football predictions and expert analysis",
      "brand": {
        "@type": "Brand",
        "name": "Sport IQ"
      },
      "offers": {
        "@type": "AggregateOffer",
        "offerCount": "4",
        "lowPrice": "100",
        "highPrice": "5000",
        "priceCurrency": "KES"
      }
    }
  </script>
